services:
  minio:
    image: minio/minio:latest
    container_name: hyperion-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    container_name: hyperion-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin123 &&
      mc mb local/hyperion --ignore-existing &&
      echo 'Bucket hyperion ready'
      "
    restart: "no"

  # Hyperion engine FE (Frontend) — StarRocks 3.4 in shared-data mode.
  # Topology mirrors the official StarRocks shared-data quickstart
  # (https://docs.starrocks.io/docs/quick_start/shared-data/): separate FE
  # and CN containers, FE started with --host_type FQDN so it advertises
  # service-name hostnames instead of container IPs. This makes stream-load
  # redirects from FE to CN reachable across containers on the same Docker
  # network, which the single-container allin1-ubuntu image cannot do.
  starrocks-fe:
    image: starrocks/fe-ubuntu:3.4.10
    container_name: hyperion-starrocks-fe
    hostname: starrocks-fe
    user: root
    depends_on:
      minio:
        condition: service_healthy
    command:
      - /bin/bash
      - -c
      - |
        echo "# enable shared-data run mode" >> /opt/starrocks/fe/conf/fe.conf
        echo "run_mode = shared_data" >> /opt/starrocks/fe/conf/fe.conf
        echo "cloud_native_storage_type = S3" >> /opt/starrocks/fe/conf/fe.conf
        /opt/starrocks/fe/bin/start_fe.sh --host_type FQDN
    ports:
      - "9030:9030"   # MySQL query protocol
      - "8030:8030"   # HTTP (stream-load entry, dashboard)
    healthcheck:
      test: ["CMD-SHELL", "mysql -u root -h starrocks-fe -P 9030 -e 'show frontends\\G' | grep 'Alive: true'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  # Hyperion engine CN (Compute Node) — registers itself with FE on startup
  # via SQL, then starts the CN process. HOST_TYPE=FQDN makes CN advertise
  # 'starrocks-cn' so FE's stream-load redirects resolve via Docker DNS.
  starrocks-cn:
    image: starrocks/cn-ubuntu:3.4.10
    container_name: hyperion-starrocks-cn
    hostname: starrocks-cn
    user: root
    depends_on:
      starrocks-fe:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - HOST_TYPE=FQDN
    command:
      - /bin/bash
      - -c
      - |
        sleep 5
        ulimit -u 65535
        ulimit -n 65535
        mysql --connect-timeout 5 -h starrocks-fe -P9030 -uroot -e \
          "ALTER SYSTEM ADD COMPUTE NODE \"starrocks-cn:9050\";" || true
        /opt/starrocks/cn/bin/start_cn.sh
    ports:
      - "8040:8040"   # CN HTTP (stream-load redirect target)
    healthcheck:
      test: ["CMD-SHELL", "mysql -u root -h starrocks-fe -P 9030 -e 'SHOW COMPUTE NODES\\G' | grep 'Alive: true'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # NOTE: hapiproject/hapi is a distroless image (no shell, no curl), so an
  # in-container HEALTHCHECK can't probe HTTP. Healthcheck is delegated to
  # the `hapi-wait` sidecar below.
  hapi-fhir:
    image: hapiproject/hapi:latest
    container_name: hyperion-hapi-fhir-shared
    ports:
      - "8080:8080"

  # One-shot probe: polls HAPI's /metadata endpoint from outside the
  # distroless container, exits 0 once HAPI responds 200. Acts as the
  # "hapi-fhir is ready" gate for downstream services. ~30-180s typical;
  # first cold start can take up to ~9 min on Windows Docker Desktop.
  hapi-wait:
    image: curlimages/curl:latest
    container_name: hyperion-hapi-wait
    depends_on:
      hapi-fhir:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "Waiting for HAPI FHIR /metadata to respond..."
        attempts=0
        until curl -sf -o /dev/null http://hapi-fhir:8080/fhir/metadata; do
          attempts=$$((attempts+1))
          if [ "$$attempts" -gt 240 ]; then
            echo "HAPI did not become ready within 20 minutes."
            exit 1
          fi
          if [ $$((attempts % 12)) -eq 0 ]; then
            echo "  still waiting ($$attempts attempts, ~$$((attempts*5/60)) min elapsed)..."
          fi
          sleep 5
        done
        echo "HAPI FHIR is ready (after $$attempts attempts)."
    restart: "no"

  # One-shot: bootstraps the engine (storage volume, core/audit DBs, FHIR
  # tables, service account), then exits 0. Safe to re-run.
  hyperion-util:
    build: .
    image: hyperion/util:local
    container_name: hyperion-util-bootstrap
    depends_on:
      starrocks-fe:
        condition: service_healthy
      starrocks-cn:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      hapi-wait:
        condition: service_completed_successfully
    env_file:
      - ./.env
    environment:
      # Override .env's localhost defaults with in-network service names
      SILVER_LAYER_QUERY_SERVER: starrocks-fe:9030
      LOCAL_STORAGE_ENDPOINT: http://minio:9000
      FHIR_SERVER_URL: http://hapi-fhir:8080/fhir
    command: ["python", "main.py", "bootstrap"]
    restart: "no"

volumes:
  minio_data:

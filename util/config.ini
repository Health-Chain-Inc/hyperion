[initialization]
deployment_type = ${DEPLOYMENT_TYPE}
fhir_service = ${FHIR_SERVICE}
cloud_storage = ${CLOUD_STORAGE}

[default_value]
is_audit = ${IS_AUDIT}
is_lineage = ${IS_LINEAGE}

[local.fhir]
server_url = ${FHIR_SERVER_URL}
timeout_seconds = ${LOCAL_FHIR_SERVER_TIMEOUT_SECONDS}

[azure.fhir]
server_url = ${AZURE_FHIR_SERVER_BASEURL}
client_id = ${AZURE_FHIR_SERVER_CLIENT_ID}
client_secret = ${AZURE_FHIR_SERVER_CLIENT_SECRET}
scope = ${AZURE_FHIR_SERVER_SCOPE}
grant_type = ${AZURE_FHIR_SERVER_GRANT_TYPE}
token_url = ${AZURE_FHIR_SERVER_TOKEN_URL}
timeout_seconds = ${AZURE_FHIR_SERVER_TIMEOUT_SECONDS}

[local.storage]
endpoint = ${LOCAL_STORAGE_ENDPOINT}
locations = ${LOCAL_STORAGE_LOCATIONS}
access_key_id = ${LOCAL_STORAGE_ACCESS_KEY_ID}
access_key_secret = ${LOCAL_STORAGE_ACCESS_KEY_SECRET}
region = ${LOCAL_STORAGE_REGION}

[azure.storage]
locations = ${AZURE_BLOB_STORAGE_SILVER_LAYER_CONTAINER}
end_point = ${AZURE_BLOB_STORAGE_END_POINT}
version = ${AZURE_BLOB_STORAGE_VERSION}
access_key = ${AZURE_BLOB_STORAGE_ACCOUNT_KEY}

[silver_layer]
username = ${SILVER_LAYER_ROOT_USERNAME}
password =${SILVER_LAYER_ROOT_PASSWORD}
query_server = ${SILVER_LAYER_QUERY_SERVER}
catalog = ${SILVER_LAYER_CATALOG}
core_database= ${SILVER_LAYER_CORE_DATABASE}
audit_database= ${SILVER_LAYER_AUDIT_DATABASE}
replication_number= ${SILVER_LAYER_REPLICA}
storage_volume= ${SILVER_LAYER_STORAGE_VOLUME}

[schema]
resource = ./schema/fhir.schema.json
destination=./schema/silver_layer_all.sql
common_table_schema_path=./schema/common_tables.sql
overwrite_schema=${SCHEMA_OVERWRITE_FLAG}
database_initialization_flag=${DATABASE_INITIALIZATION_FLAG}

[service_account]
user_name = ${SERVICE_ACCOUNT_USERNAME}
password = ${SERVICE_ACCOUNT_PASSWORD}
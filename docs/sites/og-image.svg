<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Hyperion: Query FHIR with plain SQL">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.18" r="0.5">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- columnar wordmark mark -->
  <g>
    <rect x="90" y="92" width="14" height="40" rx="4" fill="#6366f1"/>
    <rect x="112" y="70" width="14" height="62" rx="4" fill="#4f46e5"/>
    <rect x="134" y="84" width="14" height="48" rx="4" fill="#818cf8"/>
  </g>

  <g font-family="Inter, 'Segoe UI', Roboto, sans-serif">
    <text x="168" y="124" fill="#e2e8f0" font-size="40" font-weight="800" letter-spacing="-1">Hyperion</text>

    <text x="90" y="244" fill="#a5b4fc" font-size="26" font-weight="600" letter-spacing="6">FHIR-POWERED INTEROPERABILITY · OPEN SOURCE</text>

    <text x="86" y="372" fill="#ffffff" font-size="112" font-weight="800" letter-spacing="-3">Query FHIR with</text>
    <text x="86" y="492" fill="#ffffff" font-size="112" font-weight="800" letter-spacing="-3">plain SQL.</text>

    <text x="90" y="566" fill="#cbd5e1" font-size="30" font-weight="500">One table per FHIR R4 resource · speaks the MySQL wire protocol</text>
  </g>
</svg>

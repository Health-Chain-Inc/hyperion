[initialization]
cloud_storage = ${CLOUD_STORAGE}
servicebus = ${SERVICEBUS}
fhir_service = ${FHIR_SERVICE}

[silver_layer]
username = ${SERVICE_ACCOUNT_USERNAME}
password = ${SERVICE_ACCOUNT_PASSWORD}
query_server = ${SILVER_LAYER_QUERY_SERVER}
http_server = ${SILVER_LAYER_HTTP_SERVER}
catalog = ${SILVER_LAYER_CATALOG}
core_database = ${SILVER_LAYER_CORE_DATABASE}
audit_database = ${SILVER_LAYER_AUDIT_DATABASE}
is_transaction = ${SILVER_LAYER_TRANSACTION}
admin_role = ${ADMIN_ROLE}

[transaction_api]
begin_url = /api/transaction/begin
load_url = /api/transaction/load
prepare_url = /api/transaction/prepare
commit_url = /api/transaction/commit
rollback_url = /api/transaction/rollback
stream_load_url = /api/silver_layer_database/table_name/_stream_load
sql_query_url = /api/v1/catalogs/catalog_name/databases/database_name/sql

[azure.cloud_storage]
connection_string = ${AZURE_STORAGE_ACCOUNT_CONNECTION_STRING}
baseurl = ${AZURE_STORAGE_ACCOUNT_BASEURL}
account_name = ${AZURE_STORAGE_ACCOUNT_NAME}
ndjson_stage_container = ${AZURE_STORAGE_CONTAINER_STAGE}
failure_container = ${AZURE_STORAGE_CONTAINER_FAILURE}
metadata_backup_container = ${AZURE_STORAGE_CONTAINER_METADATA_BACKUP}

[azure.servicebus]
connection_string = ${AZURE_SERVICEBUS_NAMESPACE_CONNECTION_STRING}
eventload_queue_name = ${AZURE_SERVICEBUS_EVENT_QUEUE}
batch_parameter_queue_name = ${AZURE_SERVICEBUS_BATCH_PARAMETER_QUEUE}
retry_queue_name = ${AZURE_SERVICEBUS_RETRY_QUEUE}
audit_queue_name = ${AZURE_SERVICEBUS_AUDIT_QUEUE}
core_processor_subscription = ${AZURE_SERVICEBUS_CORE_SUBSCRIPTION}
core_topic= ${AZURE_SERVICEBUS_TOPIC}
audit_queue_schedule_interval = ${AZURE_SERVICEBUS_AUDIT_QUEUE_SCHEDULE_INTERVAL}

[azure.fhir]
server_url = ${AZURE_FHIR_SERVER_BASEURL}
client_id = ${AZURE_FHIR_SERVER_CLIENT_ID}
client_secret = ${AZURE_FHIR_SERVER_CLIENT_SECRET}
scope = ${AZURE_FHIR_SERVER_SCOPE}
grant_type = ${AZURE_FHIR_SERVER_GRANT_TYPE}
token_url = ${AZURE_FHIR_SERVER_TOKEN_URL}

[local.fhir]
server_url = ${FHIR_SERVER_URL}

[FHIR]
ndjson_file_size = ${NDJSON_FILE_SIZE}
max_retry_count= ${FHIR_PULL_MAX_RETRY_COUNT}
timeout_seconds=${FHIR_SERVER_TIMEOUT_SECONDS}

[pools]
database = ${DB_POOL_SIZE}

[application]
name=${APPLICATION_NAME}

[schema]
hl7_file_name = ./schema/fhir.schema.json

[processing]
threads = ${PROCESSING_THREADS}
message = ${MESSAGE_BATCH_SIZE}
converter_cores = ${CORES_CONVERTER}
exporter_cores = ${CORES_EXPORTER}
audit_batch_size = ${AUDIT_BATCH_SIZE}
audit_flush_interval = ${AUDIT_FLUSH_INTERVAL}

[default_value]
meta_source = ${DEFAULT_META_SOURCE}
is_audit = ${IS_AUDIT}
is_lineage = ${IS_LINEAGE}
delay_time = ${RETRY_MESSAGE_DELAY_TIME}
resource_types = ${RESOURCE_TYPES}
lookback_days = ${LOOKBACK_DAYS}

[fhir_exporter]
time_interval=${FHIR_EXPORTER_TIME_INTERVAL}
start_date=${FHIR_EXPORTER_START_DATE}
end_date=${FHIR_EXPORTER_END_DATE}

[scheduler_properties]
max_run_cycles=${MAX_RUN_CYCLES}
time_range_multiplier=${TIME_RANGE_MULTIPLIER}
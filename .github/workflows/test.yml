name: Tests

permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff==0.15.15
      - name: Ruff
        run: ruff check core/ util/

  core-unit:
    name: core unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: core/requirements*.txt
      - name: Install dependencies
        run: pip install -r core/requirements.txt -r core/requirements-dev.txt
      - name: Run unit tests
        run: PYTHONPATH=core pytest core/tests/pytest/unit -q --tb=short

  util-unit:
    name: util unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: util/requirements*.txt
      - name: Install dependencies
        run: pip install -r util/requirements.txt -r util/requirements-dev.txt
      - name: Run unit tests
        run: PYTHONPATH=util pytest util/tests/ -q --tb=short

  docker-build:
    name: docker build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build core image
        run: docker build -t hyperion/core:ci core/
      - name: Build util image
        run: docker build -t hyperion/util:ci util/
